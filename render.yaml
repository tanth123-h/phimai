services:
  - type: web
    name: phimai-smartflow
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: phimai-smartflow-db
          property: connectionString
      - key: ENABLE_CAMERA_WORKER
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LINE_ALERT_COOLDOWN_SECONDS
        value: "300"
      - key: LOCAL_INGEST_TOKEN
        generateValue: true

databases:
  - name: phimai-smartflow-db
    databaseName: phimai
    user: phimai
